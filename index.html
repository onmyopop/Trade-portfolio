<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senna — Resource Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══ DESIGN TOKENS ═══ */
:root{
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:6px;--r2:10px;--r3:14px;
  --done:#059669;--doing:#d97706;--todo:#6b7280;
  --danger:#dc2626;--warn:#d97706;
  --holiday-color:#7c3aed;
  --transition:.14s ease;
}

/* ── DARK THEME ── */
[data-theme="dark"]{
  /* Base surfaces */
  --bg:#0f1219;
  --bg2:#161c28;
  --bg3:#1c2333;
  --surface:#222b3a;
  --surface2:#273042;
  --surface3:#2e3a4e;

  /* Borders */
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.11);
  --border3:rgba(255,255,255,0.18);

  /* Text */
  --text:#edf0f7;
  --text2:#8b95aa;
  --text3:#4e5a6e;
  --text-inv:#ffffff;

  /* Accent */
  --accent:#5b5fc7;
  --accent2:#7b80e8;
  --accent-bg:rgba(91,95,199,0.14);

  /* Status */
  --done-bg:rgba(5,150,105,0.14);
  --doing-bg:rgba(217,119,6,0.14);
  --todo-bg:rgba(107,114,128,0.14);

  /* Gantt specific */
  --we-bg:rgba(255,255,255,0.025);
  --holiday-bg:rgba(124,58,237,0.1);
  --today-col:rgba(91,95,199,0.18);
  --today-line:#5b5fc7;
  --row-even:transparent;
  --row-line:rgba(255,255,255,0.07);
  --month-line:rgba(255,255,255,0.14);

  /* Frozen panel */
  --frozen-bg:#141a26;
  --frozen-bg2:#1a2232;
  --frozen-text:#cdd4e3;
  --frozen-border:rgba(255,255,255,0.1);

  /* Project/Sprint rows */
  --proj-row-bg:#131925;
  --proj-row-text:#edf0f7;
  --sprint-row-bg:#182036;
  --sprint-row-text:#7b80e8;
  --task-row-bg:#161c28;

  --shadow:0 4px 24px rgba(0,0,0,0.5);
  --shadow2:0 1px 4px rgba(0,0,0,0.4);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0f4f9;
  --bg2:#ffffff;
  --bg3:#f5f7fb;
  --surface:#e8edf5;
  --surface2:#dde3ee;
  --surface3:#d2d9e8;

  --border:rgba(30,40,70,0.08);
  --border2:rgba(30,40,70,0.13);
  --border3:rgba(30,40,70,0.22);

  --text:#111827;
  --text2:#4b5563;
  --text3:#9ca3af;
  --text-inv:#ffffff;

  --accent:#4f52b8;
  --accent2:#5b5fc7;
  --accent-bg:rgba(79,82,184,0.08);

  --done-bg:rgba(5,150,105,0.1);
  --doing-bg:rgba(217,119,6,0.1);
  --todo-bg:rgba(107,114,128,0.08);

  --we-bg:rgba(30,40,70,0.03);
  --holiday-bg:rgba(124,58,237,0.07);
  --today-col:rgba(79,82,184,0.1);
  --today-line:#4f52b8;
  --row-even:transparent;
  --row-line:rgba(30,40,70,0.08);
  --month-line:rgba(30,40,70,0.16);

  --frozen-bg:#ffffff;
  --frozen-bg2:#f7f9fd;
  --frozen-text:#1e2847;
  --frozen-border:rgba(30,40,70,0.1);

  --proj-row-bg:#edf1fb;
  --proj-row-text:#1e2847;
  --sprint-row-bg:#eff2ff;
  --sprint-row-text:#4f52b8;
  --task-row-bg:#ffffff;

  --shadow:0 4px 24px rgba(30,40,80,0.1);
  --shadow2:0 1px 4px rgba(30,40,80,0.08);
}

/* ═══ BASE ═══ */
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13.5px;line-height:1.5;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font);font-size:13px;color:var(--text)}

/* ═══ LAYOUT ═══ */
.layout{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{
  width:220px;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
.sidebar-logo{
  padding:16px 16px 13px;
  font-size:16px;font-weight:700;letter-spacing:-.6px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-logo-text{color:var(--text)}
.sidebar-logo-text span{color:var(--accent2)}
.theme-toggle{
  background:none;border:1px solid var(--border2);
  border-radius:var(--r);padding:4px 9px;
  font-size:13px;color:var(--text3);transition:all var(--transition);
  line-height:1;
}
.theme-toggle:hover{background:var(--surface);color:var(--text);border-color:var(--border3)}

.sidebar-section{
  padding:14px 16px 4px;
  font-size:10px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;
}
.nav{display:flex;flex-direction:column;padding:2px 8px;gap:1px}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:var(--r);
  color:var(--text2);font-size:13px;font-weight:400;
  border:none;background:none;width:100%;text-align:left;
  transition:all var(--transition);cursor:pointer;
}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{
  background:var(--accent-bg);color:var(--accent2);font-weight:500;
}

.sidebar-bottom{
  margin-top:auto;padding:10px 8px;
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;
}
.gist-status{
  padding:6px 10px;border-radius:var(--r);
  font-size:11.5px;display:flex;align-items:center;gap:7px;
}
.gist-status.connected{background:rgba(5,150,105,.1);color:var(--done)}
.gist-status.disconnected{background:var(--surface);color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sync-dot.ok{background:var(--done)}
.sync-dot.syncing{background:var(--doing);animation:pulse .9s ease-in-out infinite}
.sync-dot.err{background:var(--danger)}
.sidebar-btn{
  width:100%;padding:6px 10px;border-radius:var(--r);
  border:1px solid var(--border);background:none;
  color:var(--text2);font-size:12px;transition:all var(--transition);text-align:left;
}
.sidebar-btn:hover{background:var(--surface);color:var(--text);border-color:var(--border2)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── Main area ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--bg2);
  min-height:48px;
}
.topbar-title{
  font-size:15px;font-weight:600;letter-spacing:-.3px;flex:1;color:var(--text);
}

/* ── View toggle ── */
.view-toggle{
  display:flex;background:var(--bg3);
  border-radius:var(--r);padding:2px;gap:1px;
  border:1px solid var(--border);
}
.vt-btn{
  padding:4px 14px;border:none;border-radius:5px;
  font-size:12.5px;cursor:pointer;background:none;
  color:var(--text3);transition:all var(--transition);font-weight:500;
}
.vt-btn.active{background:var(--bg2);color:var(--text);box-shadow:var(--shadow2)}
.vt-btn:hover:not(.active){color:var(--text2)}

/* ── Buttons ── */
.btn{
  padding:6px 14px;border-radius:var(--r);font-size:12.5px;
  font-weight:500;cursor:pointer;border:none;transition:all var(--transition);
  display:inline-flex;align-items:center;gap:5px;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);box-shadow:0 2px 8px rgba(91,95,199,.35)}
.btn-ghost{
  background:none;color:var(--text2);
  border:1px solid var(--border2);
}
.btn-ghost:hover{background:var(--surface);color:var(--text);border-color:var(--border3)}
.btn-danger{background:none;color:var(--danger);border:1px solid rgba(220,38,38,.2)}
.btn-danger:hover{background:rgba(220,38,38,.08)}
.btn-sm{padding:4px 10px;font-size:12px}

/* ── Filter bar ── */
.filterbar{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 16px;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;flex-shrink:0;background:var(--bg);
}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{
  font-size:9.5px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.8px;
}
.filter-date-wrap{position:relative}
.filter-date-input{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r);padding:5px 9px;color:var(--text);
  font-size:12px;width:105px;cursor:pointer;
}
.filter-date-input:focus{outline:none;border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:4px;max-width:360px}
.chip{
  padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid;background:transparent;
  transition:all var(--transition);white-space:nowrap;
}
.fdiv{width:1px;background:var(--border2);height:28px;align-self:center}
.clear-btn{
  font-size:11px;color:var(--text3);background:none;border:none;
  cursor:pointer;padding:2px 6px;border-radius:4px;
}
.clear-btn:hover{color:var(--text2);background:var(--surface)}
.date-clear-btn{
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:10px;padding:2px 4px;border-radius:3px;opacity:.5;
}
.date-clear-btn:hover{opacity:1;color:var(--danger)}

/* ── Page content ── */
.page-content{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column}

/* ═══ GANTT ═══ */
.gantt-wrap{flex:1;overflow:auto;position:relative;background:var(--bg)}
.gantt-inner{display:flex;flex-direction:column;min-width:max-content}

/* Header */
.gantt-head-row{
  display:flex;position:sticky;top:0;z-index:30;
  background:var(--bg2);
  border-bottom:2px solid var(--border2);
}
.gantt-frozen{
  display:flex;flex-shrink:0;position:sticky;left:0;z-index:31;
  background:var(--bg2);border-right:2px solid var(--border2);
}
.gantt-frozen-sprint{width:90px;border-right:1px solid var(--border)}
.gantt-frozen-label{width:210px}
.gantt-frozen-resource{width:90px;border-right:1px solid var(--border)}
.gantt-head-label{padding:0 10px;display:flex;align-items:flex-end;padding-bottom:5px}
.gantt-head-label-text{
  font-size:9.5px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.8px;
}
.gantt-scroll-head{flex:1;display:flex;flex-direction:column;overflow:hidden}
.gantt-months-row{height:20px;display:flex;position:relative;background:var(--bg3)}
.gantt-month{
  position:absolute;top:0;height:20px;
  display:flex;align-items:center;padding-left:8px;
  font-size:9.5px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;
  border-right:2px solid var(--month-line);
  border-bottom:1px solid var(--border);
}
.g-col.month-start{border-left:2px solid var(--month-line)!important}
.gantt-day-cell.month-start{border-left:2px solid var(--month-line)!important}
.gantt-days-row{display:flex;height:26px;background:var(--bg2)}
.gantt-day-cell{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-right:1px solid var(--border);flex-shrink:0;line-height:1.2;
}
.gantt-day-cell.we{background:var(--we-bg)}
.gantt-day-cell.holiday{background:var(--holiday-bg)}
.gantt-day-cell.today{background:var(--today-col)}
.gantt-day-name{font-size:8px;color:var(--text3);font-weight:500;text-transform:uppercase}
.gantt-day-num{font-size:10.5px;color:var(--text2);font-weight:500}
.gantt-day-cell.today .gantt-day-name{color:var(--accent2);font-weight:600}
.gantt-day-cell.today .gantt-day-num{color:var(--accent2);font-weight:700}

/* ── Row base ── */
.gantt-body-row{
  display:flex;border-bottom:1px solid var(--row-line);
  min-width:max-content;
}
/* row-even removed - use border lines for separation */
.gantt-frozen-body{
  display:flex;flex-shrink:0;position:sticky;left:0;z-index:10;
  background:var(--frozen-bg);
  border-right:2px solid var(--frozen-border);
  transition:background var(--transition);
}
.gantt-body-row:hover .gantt-frozen-body{filter:brightness(1.04)}
.gantt-frozen-sprint-cell{
  width:90px;border-right:1px solid var(--border);
  padding:0 8px;display:flex;align-items:center;overflow:hidden;
  background:inherit;
}
.gantt-frozen-label-cell{
  width:210px;padding:0 10px;
  display:flex;flex-direction:column;justify-content:center;gap:1px;
  overflow:hidden;background:inherit;
}
.gantt-sprint-text{
  font-size:10px;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── Project row ── */
.gantt-proj-row{border-bottom:1px solid var(--frozen-border)!important;height:34px}
.gantt-proj-row .gantt-frozen-body{background:var(--proj-row-bg)!important}
.gantt-proj-row .gantt-frozen-sprint-cell{background:var(--proj-row-bg)}
.gantt-proj-row .gantt-frozen-label-cell{background:var(--proj-row-bg);flex-direction:row;align-items:center;gap:7px}
.proj-collapse-btn{
  background:none;border:none;color:var(--text3);
  font-size:10px;padding:2px 3px;border-radius:3px;
  cursor:pointer;flex-shrink:0;transition:transform var(--transition),color var(--transition);
  line-height:1;
}
.proj-collapse-btn:hover{color:var(--text2)}
.proj-collapse-btn.open{transform:rotate(0)}
.proj-collapse-btn.closed{transform:rotate(-90deg)}
.g-proj-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.g-proj-name{
  font-size:11px;font-weight:600;color:var(--proj-row-text);
  text-transform:uppercase;letter-spacing:.5px;
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.proj-task-count{
  font-size:10px;color:var(--text3);flex-shrink:0;
  background:var(--surface);padding:1px 6px;border-radius:10px;
}

/* ── Sprint row ── */
.gantt-sprint-row{border-bottom:1px solid var(--border2)!important;height:28px}
.gantt-sprint-row .gantt-frozen-body{background:var(--sprint-row-bg)!important}
.gantt-sprint-row .gantt-frozen-sprint-cell{background:var(--sprint-row-bg)}
.gantt-sprint-row .gantt-frozen-label-cell{background:var(--sprint-row-bg);flex-direction:row;align-items:center;gap:6px}
.sprint-collapse-btn{
  background:none;border:none;color:var(--sprint-row-text);
  font-size:9px;padding:2px 3px;border-radius:3px;
  cursor:pointer;flex-shrink:0;transition:transform var(--transition);
  opacity:.7;line-height:1;
}
.sprint-collapse-btn.open{transform:rotate(90deg)}
.sprint-collapse-btn.closed{transform:rotate(0)}
.g-sprint-name{
  font-size:10.5px;font-weight:600;color:var(--sprint-row-text);
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── Task row ── */
.gantt-task-row{height:38px;background:var(--task-row-bg)}
.gantt-task-row .gantt-frozen-body{background:var(--frozen-bg)!important}
.gantt-task-row .gantt-frozen-sprint-cell{background:var(--frozen-bg2)}
.gantt-task-row .gantt-frozen-label-cell{flex-direction:column;justify-content:center;background:var(--frozen-bg)}
.gantt-frozen-resource-cell{
  width:90px;border-right:1px solid var(--border);
  padding:0 8px;display:flex;align-items:center;
  overflow:hidden;background:var(--frozen-bg2);
}
.g-resource-chip{
  font-size:10px;padding:1px 7px;border-radius:4px;border:1px solid;
  font-weight:500;display:inline-block;line-height:1.5;
}
.g-task-title{
  font-size:12px;color:var(--text);font-weight:400;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:195px;
}

/* ── Gantt track ── */
.gantt-track-cell{flex:1;position:relative;overflow:visible}
.gantt-track-inner{position:relative;height:100%}
.g-col{position:absolute;top:0;bottom:0;border-right:1px solid var(--border);pointer-events:none}
.g-col.we{background:var(--we-bg)}
.g-col.holiday{background:var(--holiday-bg)}
.g-col.today{background:var(--today-col);border-right:2px solid var(--today-line)}
.g-col.month-start{border-left:2px solid var(--month-line)!important}

/* ── Gantt bar ── */
.g-bar{
  position:absolute;top:6px;height:26px;
  border-radius:5px;display:flex;align-items:center;
  padding:0 8px;cursor:grab;user-select:none;z-index:2;
  transition:opacity var(--transition),filter var(--transition);
  opacity:.88;box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.g-bar:hover{opacity:1;filter:brightness(1.08);z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.g-bar.dragging{opacity:.7;cursor:grabbing;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.g-bar-left-handle,.g-bar-right-handle{
  position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize;
  background:rgba(0,0,0,.15);
}
.g-bar-left-handle{left:0;border-radius:5px 0 0 5px}
.g-bar-right-handle{right:0;border-radius:0 5px 5px 0}
.g-bar-text{
  font-size:11px;color:rgba(255,255,255,.95);font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;pointer-events:none;
}
.g-bar-md{
  font-size:9.5px;color:rgba(255,255,255,.7);
  margin-left:4px;flex-shrink:0;font-family:var(--mono);pointer-events:none;
}
.g-bar-actions{
  display:none;position:absolute;top:-30px;right:0;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r);padding:3px;gap:1px;z-index:30;
  box-shadow:var(--shadow);
}
.g-bar:hover .g-bar-actions{display:flex}
.g-bar-action-btn{
  background:none;border:none;padding:3px 7px;
  border-radius:4px;font-size:11px;color:var(--text2);
  cursor:pointer;white-space:nowrap;
}
.g-bar-action-btn:hover{background:var(--surface);color:var(--text)}

/* ═══ RESOURCE GRID ═══ */
.rg-wrap{flex:1;overflow:auto;position:relative;background:var(--bg)}
.rg-inner{min-width:max-content;display:flex;flex-direction:column}
.rg-header{
  display:flex;position:sticky;top:0;z-index:20;
  background:var(--bg2);border-bottom:2px solid var(--border2);
}
.rg-frozen-head{
  flex-shrink:0;width:150px;position:sticky;left:0;z-index:21;
  background:var(--bg2);border-right:2px solid var(--border2);
  padding:6px 12px;display:flex;align-items:flex-end;padding-bottom:5px;
}
.rg-frozen-text{font-size:9.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.rg-dates-wrap{display:flex;flex-direction:column}
.rg-week-row{display:flex;height:20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.rg-week{
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--text3);border-right:1px solid var(--border2);
}
.rg-day-row{display:flex;height:26px;background:var(--bg2)}
.rg-day-h{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-right:1px solid var(--border);font-size:8px;color:var(--text3);flex-shrink:0;line-height:1.2;
}
.rg-day-h.we{background:var(--we-bg)}
.rg-day-h.holiday{background:var(--holiday-bg)}
.rg-day-h.today{background:var(--today-col)}
.rg-day-h.month-start{border-left:2px solid var(--month-line)!important}
.rg-day-h-name{font-size:7.5px;font-weight:600;text-transform:uppercase}

// ═══════════════════════════════════════════════════════════════════
// DATE UTILS
// ═══════════════════════════════════════════════════════════════════
function toISO(d){ // Date → 'YYYY-MM-DD'
  return d.toISOString().slice(0,10)
}
function parseISO(s){ // 'YYYY-MM-DD' → Date (local midnight)
  const [y,m,d] = s.split('-').map(Number)
  return new Date(y,m-1,d)
}
function parseDMY(s){ // 'DD/MM/YYYY' → Date
  const parts = s.trim().split('/')
  if(parts.length!==3) return null
  const [d,m,y] = parts.map(Number)
  if(!d||!m||!y||y<2000) return null
  return new Date(y,m-1,d)
}
function fmtDMY(isoOrDate){ // → 'DD/MM/YYYY'
  const d = typeof isoOrDate==='string' ? parseISO(isoOrDate) : isoOrDate
  if(!d||isNaN(d)) return ''
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()
}
function isoToday(){ return toISO(new Date()) }

function isWeekend(isoDate){
  const d = new Date(isoDate+'T00:00:00')
  return d.getDay()===0||d.getDay()===6
}
function isHoliday(isoDate){
  return DB.holidays.some(h=>h.date===isoDate)
}
function isNonWorkday(isoDate){ return isWeekend(isoDate)||isHoliday(isoDate) }

// Add N work-hours to startDate → endDate (ISO)
// 1 manday = 8 hours
function calcEndDate(startISO, manday){
  let remaining = Math.round(manday * 8) // hours
  let cur = parseISO(startISO)
  if(isNonWorkday(toISO(cur))){
    // advance to first workday
    while(isNonWorkday(toISO(cur))) cur.setDate(cur.getDate()+1)
  }
  while(remaining > 0){
    if(!isNonWorkday(toISO(cur))){
      remaining -= 8
      if(remaining > 0) cur.setDate(cur.getDate()+1)
      // find next workday
      while(remaining > 0 && isNonWorkday(toISO(cur))) cur.setDate(cur.getDate()+1)
    } else {
      cur.setDate(cur.getDate()+1)
    }
  }
  return toISO(cur)
}

// Count work-manday between start and end (inclusive)
function calcManday(startISO, endISO){
  let count = 0
  const cur = parseISO(startISO)
  const end = parseISO(endISO)
  while(cur <= end){
    if(!isNonWorkday(toISO(cur))) count++
    cur.setDate(cur.getDate()+1)
  }
  return count
}

function getDays(start,end){
  const days=[], cur=parseISO(start), last=parseISO(end)
  while(cur<=last){ days.push(toISO(cur)); cur.setDate(cur.getDate()+1) }
  return days
}
function dayDiff(a,b){
  return Math.round((parseISO(b)-parseISO(a))/86400000)
}

// Get range covering all tasks (+ padding)
function getFullRange(){
  const tasks = DB.tasks
  if(!tasks.length) return { start: isoToday(), end: isoToday() }
  let min=tasks[0].startDate, max=tasks[0].endDate
  for(const t of tasks){
    if(t.startDate<min) min=t.startDate
    if(t.endDate>max) max=t.endDate
  }
  // pad 7 days each side
  const s = parseISO(min); s.setDate(s.getDate()-7)
  const e = parseISO(max); e.setDate(e.getDate()+14)
  return { start:toISO(s), end:toISO(e) }
}
function getEffectiveRange(){
  if(filters.startDate && filters.endDate) return { start:filters.startDate, end:filters.endDate }
  return getFullRange()
}

  const sys = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'

}

function saveLocal(){ localStorage.setItem('senna_db', JSON.stringify(DB)) }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function setSyncing(v){
  const dot = document.getElementById('sync-dot')
  if(dot) dot.className='sync-dot '+(v?'syncing':(GIST.id?'ok':''))
}
function updateGistUI(){
  const box=document.getElementById('gist-status-box')
  const txt=document.getElementById('gist-status-text')
  const dot=document.getElementById('sync-dot')
  if(!box) return
  if(GIST.id){
    box.className='gist-status connected'
    txt.textContent='Gist: '+GIST.id.slice(0,8)+'…'
    dot.className='sync-dot ok'
  } else {
    box.className='gist-status disconnected'
    txt.textContent='Not connected'
    dot.className='sync-dot'
  }
}
async function syncFromGist(){
  if(!GIST.id||!GIST.token) return
  setSyncing(true)
  try{
    const res=await fetch(`https://api.github.com/gists/${GIST.id}`,{
      headers:{Authorization:`Bearer ${GIST.token}`,Accept:'application/vnd.github+json'}
    })
    if(!res.ok) throw new Error('Status '+res.status)
    const data=await res.json()
    const content=data.files['senna-db.json']?.content
    if(content){ DB=JSON.parse(content); saveLocal(); toast('Synced ✓','ok'); render() }
  }catch(e){ toast('Sync failed: '+e.message,'err') }
  setSyncing(false)
}
async function pushToGist(){
  if(!GIST.id||!GIST.token) return
  setSyncing(true)
  try{
    const res=await fetch(`https://api.github.com/gists/${GIST.id}`,{
      method:'PATCH',
      headers:{Authorization:`Bearer ${GIST.token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({files:{'senna-db.json':{content:JSON.stringify(DB,null,2)}}})
    })
    if(!res.ok) throw new Error('Status '+res.status)
  }catch(e){ toast('Push failed: '+e.message,'err') }
  setSyncing(false)
}
async function saveDB(){ saveLocal(); if(GIST.id&&GIST.token) await pushToGist() }

function toggleFilter(key,val){
  const arr=filters[key]
  filters[key]=arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]
  render()
}
function clearFilters(){ filters.projectIds=[];filters.resourceIds=[];filters.statuses=[];render() }
function toggleCollapse(key){
  collapseState[key]=!collapseState[key]
  render()
}

function getFilteredTasks(){
  const {start,end}=getEffectiveRange()
  let tasks=DB.tasks.filter(t=>t.endDate>=start&&t.startDate<=end)
  if(filters.projectIds.length) tasks=tasks.filter(t=>filters.projectIds.includes(t.projectId))
  if(filters.resourceIds.length) tasks=tasks.filter(t=>
    (t.resources||[]).some(r=>filters.resourceIds.includes(r.resourceId))
  )
  if(filters.statuses.length) tasks=tasks.filter(t=>filters.statuses.includes(t.status))
  if(filters.search){ const q=filters.search.trim().toLowerCase(); if(q) tasks=tasks.filter(t=>t.title&&t.title.toLowerCase().includes(q)) }
  return tasks
}

// Helper: expand tasks into per-resource rows for Gantt
function expandTaskRows(tasks){
  const rows=[]
  for(const t of tasks){
    const res=t.resources||[]
    if(res.length===0){
      rows.push({task:t,resourceId:'',manday:0})
    } else {
      for(const r of res){
        rows.push({task:t,resourceId:r.resourceId,manday:r.manday})
      }
    }
  }
  return rows
}

  if(currentPage==='timeline') main.innerHTML=renderTimeline()
  else if(currentPage==='projects') main.innerHTML=renderProjectsPage()
  else if(currentPage==='resources') main.innerHTML=renderResourcesPage()
  afterRender()
}

        document.querySelectorAll('.task-checkbox').forEach(cb=>{

function renderGantt(){
  const {start,end}=getEffectiveRange()
  const days=getDays(start,end)
  const today=isoToday()
  const projMap=Object.fromEntries(DB.projects.map(p=>[p.id,p]))
  const resMap=Object.fromEntries(DB.resources.map(r=>[r.id,r]))
  const tasks=getFilteredTasks()
  const totalW=days.length*DAY_W

  // Build month labels
  let months=[],prev='',mStart=0,mCnt=0
  days.forEach((d,i)=>{
    const mk=d.slice(0,7)
    if(mk!==prev){if(prev)months.push({label:prev,width:mCnt*DAY_W,left:mStart});prev=mk;mStart=i*DAY_W;mCnt=0}
    mCnt++
  })
  if(prev)months.push({label:prev,width:mCnt*DAY_W,left:mStart})

  const DOW=['Su','M','Tu','W','Th','F','Sa']
  const statusColors={'Done':'var(--done)','Doing':'var(--doing)','To do':'var(--todo)'}

  // Group: project → sprint → tasks
  const projOrder=DB.projects.map(p=>p.id).filter(pid=>tasks.some(t=>t.projectId===pid))
  const grouped={}
  for(const pid of projOrder){
    grouped[pid]={}
    const ptasks=tasks.filter(t=>t.projectId===pid)
    for(const t of ptasks){
      const sp=t.sprint||'(No Sprint)'
      if(!grouped[pid][sp]) grouped[pid][sp]=[]
      grouped[pid][sp].push(t)
    }
  }

  // Today offset
  const todayOffset=dayDiff(start,today)

  // Render rows
  let rows=''
  for(const pid of projOrder){
    const proj=projMap[pid]||{name:'?',color:'#888'}
    const projCollapsed=collapseState['p:'+pid]
    const ptaskCount=tasks.filter(t=>t.projectId===pid).length
    // Project row
    rows+=`<div class="gantt-body-row gantt-proj-row" style="height:32px">
      <div class="gantt-frozen-body" style="background:var(--bg2)">
        <div class="gantt-frozen-sprint-cell" style="background:var(--bg2)"></div>

              data-start="${t.startDate}" data-end="${t.endDate}" data-offset="${offset}" data-dur="${dur}">
              <div class="g-bar-left-handle" data-handle="left" data-taskid="${t.id}"></div>
              <span class="g-bar-text">${esc(t.title)}</span>
              <span class="g-bar-md">${rowMd}d</span>
              <div class="g-bar-right-handle" data-handle="right" data-taskid="${t.id}"></div>
              <div class="g-bar-actions">
                <button class="g-bar-action-btn" onclick="openTaskModal('${t.id}');event.stopPropagation()">✏ Edit</button>
                <button class="g-bar-action-btn" onclick="duplicateTask('${t.id}');event.stopPropagation()">⧉ Dupe</button>
                <button class="g-bar-action-btn" style="color:var(--danger)" onclick="deleteTaskDirect('${t.id}');event.stopPropagation()">✕ Del</button>
              </div>
            </div>
          </div></div>
        </div>`
      }
    }
  }

  // Today line position
  const todayLine = todayOffset>=0&&todayOffset<=days.length ?
    `<div class="today-line" id="today-line" style="left:${300+todayOffset*DAY_W}px;top:0;height:100%"></div>` : ''

  return `<div class="gantt-wrap" id="gantt-wrap">
    <div class="gantt-inner${selectMode?' select-mode':''}" id="gantt-inner">
      <!-- Header -->
      <div class="gantt-head-row">
        <div class="gantt-frozen" style="z-index:31">
          <div class="gantt-frozen-sprint gantt-head-label">
            <span class="gantt-head-label-text">Sprint</span>
          </div>
          <div class="gantt-frozen-label gantt-head-label">
            <span class="gantt-head-label-text">Project / Task</span>
          </div>
          <div class="gantt-frozen-resource gantt-head-label">
            <span class="gantt-head-label-text">Resource</span>
          </div>
        </div>
        <div class="gantt-scroll-head">
          <div class="gantt-months-row" style="width:${totalW}px">
            ${months.map(m=>`<div class="gantt-month" style="width:${m.width}px;left:${m.left}px">${new Date(m.label+'-01').toLocaleString('en',{month:'short',year:'2-digit'})}</div>`).join('')}
          </div>
          <div class="gantt-days-row" style="width:${totalW}px">
            ${days.map(d=>{
              const dt=new Date(d+'T00:00:00')
              const we=isWeekend(d), hol=isHoliday(d), tod=d===today
              return `<div class="gantt-day-cell${we?' we':''}${hol?' holiday':''}${tod?' today':''}" style="width:${DAY_W}px">
                <span class="gantt-day-name">${DOW[dt.getDay()]}</span>
                <span class="gantt-day-num">${dt.getDate()}</span>
              </div>`
            }).join('')}
          </div>
        </div>
      </div>
      <!-- Body -->
      <div id="gantt-body" style="position:relative">
        ${rows}
      </div>
    </div>
  </div>`
}

// SCROLL TO TODAY
// ═══════════════════════════════════════════════════════════════════
function scrollToToday(){
  setTimeout(()=>{
    const isGantt=currentView==='gantt'
    const wrap=isGantt
      ? document.getElementById('gantt-wrap')
      : document.querySelector('.rg-wrap')
    if(!wrap) return
    const {start}=getEffectiveRange()
    const offset=dayDiff(start,isoToday())
    const CELL=isGantt?DAY_W:72
    const FROZEN=isGantt?340:150
    const scrollX=Math.max(0,(offset*CELL)-wrap.clientWidth/2+FROZEN)
    wrap.scrollLeft=scrollX
  },80)
}

// ═══════════════════════════════════════════════════════════════════
// DRAG & RESIZE
// ═══════════════════════════════════════════════════════════════════
function initGanttDrag(){
  const wrap=document.getElementById('gantt-wrap')
  if(!wrap) return
  let drag=null
  let rowDrag=null
  function getTaskById(id){ return DB.tasks.find(t=>t.id===id) }

  wrap.addEventListener('mousedown', e=>{
    const rowHandle=e.target.closest('[data-rowtaskid]')
    if(rowHandle){
      e.preventDefault()
      const taskId=rowHandle.dataset.rowtaskid
      const sourceRow=rowHandle.closest('.gantt-task-row')
      rowDrag={taskId,sourceRow,lastOverRow:null,lastPos:null}
      sourceRow.classList.add('row-dragging')
      document.body.style.cursor='grabbing'
      return
    }
    const handle=e.target.closest('[data-handle]')
    const bar=e.target.closest('.g-bar')
    if(!bar) return
    const taskId=bar.dataset.taskid
    const t=getTaskById(taskId)
    if(!t) return
    e.preventDefault()
    const {start}=getEffectiveRange()
    const type=handle?handle.dataset.handle:'move'
    drag={type,taskId,bar,startX:e.clientX,origStart:t.startDate,origEnd:t.endDate,
          origL:parseInt(bar.style.left)||0,origW:parseInt(bar.style.width)||DAY_W,rangeStart:start}
    bar.classList.add('dragging')
    document.body.style.cursor=type==='move'?'grabbing':'ew-resize'
  })

  document.addEventListener('mousemove', e=>{
    if(rowDrag){
      if(rowDrag.lastOverRow) rowDrag.lastOverRow.classList.remove('row-drag-over-top','row-drag-over-bottom')
      const overEl=document.elementFromPoint(e.clientX,e.clientY)
      const overRow=overEl?.closest('.gantt-task-row')
      if(overRow&&overRow!==rowDrag.sourceRow){
        const rect=overRow.getBoundingClientRect()
        const pos=e.clientY<rect.top+rect.height/2?'top':'bottom'
        overRow.classList.add(pos==='top'?'row-drag-over-top':'row-drag-over-bottom')
        rowDrag.lastOverRow=overRow; rowDrag.lastPos=pos
      } else { rowDrag.lastOverRow=null; rowDrag.lastPos=null }
      return
    }
    if(!drag) return
    const dx=e.clientX-drag.startX
    const daysDelta=Math.round(dx/DAY_W)
    const {start}=getEffectiveRange()
    const t=getTaskById(drag.taskId)
    if(!t) return
    if(drag.type==='move'){
      const newOffset=Math.max(0,drag.origL+daysDelta*DAY_W)
      drag.bar.style.left=newOffset+'px'
      const newStart=addDays(start,Math.round(newOffset/DAY_W))
      const dur=dayDiff(drag.origStart,drag.origEnd)
      drag.bar.querySelector('.g-bar-md').textContent=calcManday(newStart,addDays(newStart,dur))+'d'
    } else if(drag.type==='right'){
      const newW=Math.max(DAY_W,drag.origW+daysDelta*DAY_W)
      drag.bar.style.width=newW+'px'
      const offset=Math.round((parseInt(drag.bar.style.left)||0)/DAY_W)
      const newStart=addDays(start,offset)
      drag.bar.querySelector('.g-bar-md').textContent=calcManday(newStart,addDays(newStart,Math.round(newW/DAY_W)-1))+'d'
    } else if(drag.type==='left'){
      const newL=Math.max(0,drag.origL+daysDelta*DAY_W)
      const newW=Math.max(DAY_W,drag.origW+(-daysDelta*DAY_W))
      drag.bar.style.left=newL+'px'; drag.bar.style.width=newW+'px'
      const newStart=addDays(start,Math.round(newL/DAY_W))
      const newEnd=addDays(start,Math.round((drag.origL+drag.origW)/DAY_W)-1)
      drag.bar.querySelector('.g-bar-md').textContent=calcManday(newStart,newEnd)+'d'
    }
  })

  document.addEventListener('mouseup', async e=>{
    if(rowDrag){
      const {taskId,sourceRow,lastOverRow,lastPos}=rowDrag
      sourceRow.classList.remove('row-dragging')
      document.body.style.cursor=''
      if(lastOverRow) lastOverRow.classList.remove('row-drag-over-top','row-drag-over-bottom')
      rowDrag=null
      if(lastOverRow&&lastPos){
        const targetTaskId=lastOverRow.dataset.taskid
        if(targetTaskId&&targetTaskId!==taskId){
          const srcIdx=DB.tasks.findIndex(t=>t.id===taskId)
          const tgtIdx=DB.tasks.findIndex(t=>t.id===targetTaskId)
          if(srcIdx>-1&&tgtIdx>-1){
            const [removed]=DB.tasks.splice(srcIdx,1)
            const insertAt=lastPos==='top'?(tgtIdx>srcIdx?tgtIdx-1:tgtIdx):(tgtIdx>srcIdx?tgtIdx:tgtIdx+1)
            DB.tasks.splice(Math.max(0,insertAt),0,removed)
            DB.tasks.forEach((t,i)=>t.order=i)
            await saveDB(); render()
          }
        }
      }
      return
    }
    if(!drag) return
    const {bar,taskId,startX,origStart,origEnd,type}=drag
    bar.classList.remove('dragging'); document.body.style.cursor=''
    const daysDelta=Math.round((e.clientX-startX)/DAY_W)
    if(daysDelta!==0){
      const t=getTaskById(taskId)
      if(t){
        let newStart=origStart,newEnd=origEnd
        if(type==='move'){ newStart=shiftDate(origStart,daysDelta); newEnd=shiftDate(origEnd,daysDelta) }
        else if(type==='right'){ newEnd=shiftDate(origEnd,daysDelta); if(newEnd<newStart)newEnd=newStart }
        else if(type==='left'){ newStart=shiftDate(origStart,daysDelta); if(newStart>newEnd)newStart=newEnd }
        const newMd=calcManday(newStart,newEnd)
        const conflict=DB.tasks.some(ot=>ot.id!==taskId&&ot.resourceId===t.resourceId&&ot.startDate<=newEnd&&ot.endDate>=newStart)
        if(conflict) toast('⚠ Resource conflict on these dates','warn')
        t.startDate=newStart; t.endDate=newEnd; t.manday=newMd
        await saveDB(); render()
      }
    }
    drag=null
  })
}

function addDays(isoDate, n){
  const d=parseISO(isoDate); d.setDate(d.getDate()+n); return toISO(d)
}
function shiftDate(isoDate, days){
  const d=parseISO(isoDate); d.setDate(d.getDate()+days); return toISO(d)
}

// RESOURCE GRID
// ═══════════════════════════════════════════════════════════════════
function renderResourceGrid(){
  const {start,end}=getEffectiveRange()
  const days=getDays(start,end)
  const today=isoToday()
  const projMap=Object.fromEntries(DB.projects.map(p=>[p.id,p]))
  const tasks=getFilteredTasks()
  const CELL_W=72
  const DOW=['Su','M','Tu','W','Th','F','Sa']

  // Build lookup: resourceId → date → [{task,projColor,mdPerDay,projectId,projName}]
  // mdPerDay = resEntry.manday ÷ workdays in task range (like Excel formula)
  const lookup={}
  for(const t of tasks){
    const proj=projMap[t.projectId]
    if(!proj) continue
    // Count workdays in full task range
    const allTaskDays=getDays(t.startDate,t.endDate)
    const workdayCount=Math.max(1,allTaskDays.filter(d=>!isNonWorkday(d)).length)
    const tDays=getDays(
      t.startDate<start?start:t.startDate,
      t.endDate>end?end:t.endDate
    )
    for(const resEntry of (t.resources||[])){
      const mdPerDay=Math.round((resEntry.manday/workdayCount)*1000)/1000
      for(const d of tDays){
        if(isNonWorkday(d)) continue
        const k=resEntry.resourceId+'__'+d
        if(!lookup[k]) lookup[k]=[]
        lookup[k].push({task:t,projColor:proj.color,mdPerDay,projectId:t.projectId,projName:proj.name})
      }
    }
  }

  // Week groups
  let weeks=[],wk=[]
  for(const d of days){
    const dow=new Date(d+'T00:00:00').getDay()
    if(dow===1&&wk.length){weeks.push(wk);wk=[]}
    wk.push(d)
  }
  if(wk.length) weeks.push(wk)

  const ress=DB.resources.filter(r=>!filters.resourceIds.length||filters.resourceIds.includes(r.id))

  return `<div class="rg-wrap">
    <div class="rg-inner">
      <div class="rg-header">
        <div class="rg-frozen-head"><span class="rg-frozen-text">Resource</span></div>
        <div class="rg-dates-wrap">
          <div class="rg-month-row" style="height:18px;display:flex;position:relative;width:${days.length*CELL_W}px">
            ${(()=>{let ms=[],prev='',mStart=0,mCnt=0;days.forEach((d,i)=>{const mk=d.slice(0,7);if(mk!==prev){if(prev)ms.push({label:prev,width:mCnt*CELL_W,left:mStart});prev=mk;mStart=i*CELL_W;mCnt=0}mCnt++});if(prev)ms.push({label:prev,width:mCnt*CELL_W,left:mStart});return ms.map(m=>`<div style="position:absolute;left:${m.left}px;width:${m.width}px;height:18px;display:flex;align-items:center;padding-left:6px;font-size:9.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;border-right:2px solid var(--border2);border-bottom:1px solid var(--border);box-sizing:border-box">${new Date(m.label+'-01').toLocaleString('en',{month:'short',year:'2-digit'})}</div>`).join('')})()}
          </div>
          <div class="rg-day-row">
            ${days.map(d=>{
              const dt=new Date(d+'T00:00:00')
              const we=isWeekend(d),hol=isHoliday(d),tod=d===today,fom=dt.getDate()===1
              return `<div class="rg-day-h${we?' we':''}${hol?' holiday':''}${tod?' today':''}${fom?' month-start':''}" style="width:${CELL_W}px">
                <span class="rg-day-h-name">${DOW[dt.getDay()]}</span>
                <span class="rg-day-h-num">${dt.getDate()}</span>
              </div>`
            }).join('')}
          </div>
        </div>
      </div>
      ${ress.map(r=>`
      <div class="rg-resource-row">
        <div class="rg-frozen-cell">
          <div class="rg-dot" style="background:${r.color||'#64748b'}">${esc(r.name.slice(0,2))}</div>
          <div><div class="rg-name">${esc(r.name)}</div>${r.role?`<div class="rg-role">${r.role}</div>`:''}</div>
        </div>
        <div class="rg-cells-row">
          ${days.map(d=>{
            const we=isWeekend(d),hol=isHoliday(d),tod=d===today
            const fom2=new Date(d+'T00:00:00').getDate()===1
            const items=lookup[r.id+'__'+d]||[]
            // Group by project - sum mdPerDay per project
            const projGroups={}
            for(const x of items){
              if(!projGroups[x.projectId]) projGroups[x.projectId]={name:x.projName,color:x.projColor,md:0}
              projGroups[x.projectId].md=Math.round((projGroups[x.projectId].md+x.mdPerDay)*1000)/1000
            }
            const projList=Object.values(projGroups)
            const totalMd=Math.round(projList.reduce((s,p)=>s+p.md,0)*1000)/1000
            const over=totalMd>1
            // Tooltip: show project lines
            const tipLines=projList.length>0?projList.map(p=>p.name+' ('+p.md+' MD)').join('&#10;'):'ว่าง'
            const cellClick=(!we&&!hol)?(' data-rid="'+r.id+'" data-date="'+d+'" onclick="openDayModal(this.dataset.rid,this.dataset.date)"'):''
            return '<div class="rg-cell'+(we?' we':'')+(hol?' holiday':'')+(tod?' today':'')+(over?' overloaded':'')+(fom2?' month-start':'')+'" style="width:'+CELL_W+'px" title="'+esc(tipLines)+'"'+cellClick+'>'
              +(projList.length>0&&!we&&!hol
                ?'<div class="rg-cell-inner">'
                  +projList.map(p=>'<div class="rg-proj-line" style="border-left:2px solid '+p.color+'">'
                    +'<span class="rg-proj-name-sm" style="color:'+p.color+'">'+esc(p.name)+'</span>'
                    +'<span class="rg-proj-md">'+(p.md%1===0?p.md:p.md.toFixed(2))+'</span>'
                  +'</div>').join('')
                  +(over?'<div class="rg-warn">⚠</div>':'')
                +'</div>'
                :(!we&&!hol?'<div class="rg-empty-text">ว่าง</div>':''))
            +'</div>'
          }).join('')}
        </div>
      </div>`).join('')}
    </div>
  </div>`
}

// DAY DETAIL MODAL (Resource view)
// ═══════════════════════════════════════════════════════════════════
function openDayModal(resourceId, dateISO){
  const res=DB.resources.find(r=>r.id===resourceId)
  if(!res) return
  const projMap=Object.fromEntries(DB.projects.map(p=>[p.id,p]))
  const dayTasks=DB.tasks.filter(t=>
    t.startDate<=dateISO && t.endDate>=dateISO &&
    (t.resources||[]).some(r=>r.resourceId===resourceId)
  )
  // Calculate manday per day for this resource
  const dayTasksWithMd=dayTasks.map(t=>{
    const resEntry=(t.resources||[]).find(r=>r.resourceId===resourceId)||{manday:0}
    const allDays=getDays(t.startDate,t.endDate)
    const workdays=Math.max(1,allDays.filter(d=>!isNonWorkday(d)).length)
    const mdPerDay=Math.round((resEntry.manday/workdays)*1000)/1000
    return {...t,_mdPerDay:mdPerDay,_totalMd:resEntry.manday}
  })
  const totalMd=Math.round(dayTasksWithMd.reduce((s,t)=>s+t._mdPerDay,0)*1000)/1000
  const overloaded=totalMd>1
  const initials=res.name.slice(0,2)
  const taskRows=dayTasks.length===0
    ?'<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">No tasks on this day</div>'
    :dayTasksWithMd.map(t=>{
        const proj=projMap[t.projectId]||{name:'?',color:'#888'}
        const statusColor=t.status==='Done'?'var(--done)':t.status==='Doing'?'var(--doing)':'var(--text3)'
        const statusBg=t.status==='Done'?'rgba(16,185,129,.15)':t.status==='Doing'?'rgba(245,158,11,.15)':'rgba(71,85,105,.15)'
        return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--r);margin-bottom:8px;border-left:3px solid '+proj.color+'">'
          +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</div>'
          +'<div style="font-size:11.5px;color:var(--text3);margin-top:2px"><span style="color:'+proj.color+';font-weight:500">'+esc(proj.name)+'</span>'+(t.sprint?' · '+esc(t.sprint):'')+'</div>'
          +'</div>'
          +'<div style="text-align:right;flex-shrink:0">'
          +'<div style="font-size:14px;font-weight:600;color:var(--text)">'+t._mdPerDay.toFixed(2)+' MD</div>'
          +'<div style="font-size:10px;color:var(--text3);margin-top:1px">Total: '+t._totalMd+' MD</div>'
          +'<div style="font-size:10px;padding:2px 7px;border-radius:10px;margin-top:3px;background:'+statusBg+';color:'+statusColor+'">'+t.status+'</div>'
          +'</div></div>'
      }).join('')
  const html='<div class="modal-head"><div class="modal-title">'+fmtDMY(dateISO)+'</div><button class="modal-x" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-body">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)">'
    +'<div style="width:32px;height:32px;border-radius:50%;background:'+(res.color||'#64748b')+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px">'+initials+'</div>'
    +'<div><div style="font-size:14px;font-weight:600;color:var(--text)">'+esc(res.name)+'</div><div style="font-size:12px;color:var(--text3)">'+(res.role||'No role')+'</div></div>'
    +'<div style="margin-left:auto;text-align:right">'
    +'<div style="font-size:18px;font-weight:600;color:'+(overloaded?'var(--danger)':'var(--text)')+'">'+totalMd.toFixed(2)+' MD</div>'
    +'<div style="font-size:11px;color:var(--text3)">'+dayTasks.length+' task'+(dayTasks.length!==1?'s':'')+'</div>'
    +'</div></div>'
    +taskRows
    +'</div>'
  showModal(html)
}

// DATE PICKER COMPONENT
// ═══════════════════════════════════════════════════════════════════
let openDPId=null
const _dpCallbacks={}
function renderDatePicker(id, isoValue, minISO='', onChangeCb=''){
  const display=isoValue?fmtDMY(isoValue):''
  if(onChangeCb) _dpCallbacks[id]=onChangeCb
  return `<div class="dp-wrap" id="dpwrap-${id}">
    <input class="dp-input" id="dpinput-${id}" value="${display}" placeholder="dd/mm/yyyy" readonly
      onclick="toggleDP('${id}','${minISO}')">
    <div class="dp-popup hidden" id="dppop-${id}">
      <div class="dp-nav">
        <button class="dp-nav-btn" onclick="dpNav('${id}',-1)">‹</button>
        <span class="dp-month-year" id="dpmy-${id}"></span>
        <button class="dp-nav-btn" onclick="dpNav('${id}',1)">›</button>
      </div>
      <div class="dp-grid" id="dpgrid-${id}"></div>
      <div class="dp-manual-row">
        <input class="dp-manual-input" id="dpman-${id}" placeholder="dd/mm/yyyy" maxlength="10">
        <button class="dp-manual-btn" onclick="dpManualSet('${id}','${onChangeCb}')">OK</button>
      </div>
    </div>
  </div>`
}

const dpState={} // id → {year,month,isoValue,min,onChangeCb}

function toggleDP(id,min){
  const cb=_dpCallbacks[id]||''
  const pop=document.getElementById('dppop-'+id)
  if(!pop) return
  if(openDPId&&openDPId!==id){
    const prev=document.getElementById('dppop-'+openDPId)
    if(prev) prev.classList.add('hidden')
  }
  if(!pop.classList.contains('hidden')){ pop.classList.add('hidden'); openDPId=null; return }
  const inp=document.getElementById('dpinput-'+id)
  const cur=parseDMY(inp.value)||new Date()
  dpState[id]={year:cur.getFullYear(),month:cur.getMonth(),isoValue:toISO(cur),min:min||'',onChangeCb:_dpCallbacks[id]||''}
  pop.classList.remove('hidden')
  openDPId=id
  dpRender(id)
}
function dpNav(id,dir){
  if(!dpState[id]) return
  dpState[id].month+=dir
  if(dpState[id].month>11){dpState[id].month=0;dpState[id].year++}
  if(dpState[id].month<0){dpState[id].month=11;dpState[id].year--}
  dpRender(id)
}
function dpRender(id){
  const s=dpState[id]; if(!s) return
  const {year,month}=s
  const mLabel=new Date(year,month,1).toLocaleString('en',{month:'long',year:'numeric'})
  document.getElementById('dpmy-'+id).textContent=mLabel
  const today=isoToday()
  const grid=document.getElementById('dpgrid-'+id)
  const DOW=['Su','M','Tu','W','Th','F','Sa']
  let html=DOW.map(d=>`<div class="dp-dow">${d}</div>`).join('')
  const firstDay=new Date(year,month,1).getDay()
  const daysInMonth=new Date(year,month+1,0).getDate()
  const prevDays=new Date(year,month,0).getDate()
  for(let i=0;i<firstDay;i++){
    const d=prevDays-firstDay+1+i
    html+=`<button class="dp-day-btn other-month" disabled>${d}</button>`
  }
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const we=isWeekend(iso),hol=isHoliday(iso),tod=iso===today,sel=iso===s.isoValue
    html+=`<button class="dp-day-btn${we?' we':''}${hol?' holiday':''}${tod?' today':''}${sel?' selected':''}"
      onclick="dpSelect('${id}','${iso}')">${d}</button>`
  }
  grid.innerHTML=html
}
function dpSelect(id,iso){
  const s=dpState[id]; if(!s) return
  s.isoValue=iso
  const inp=document.getElementById('dpinput-'+id)
  inp.value=fmtDMY(iso)
  document.getElementById('dppop-'+id).classList.add('hidden')
  openDPId=null
  if(s.onChangeCb) evalDPCb(s.onChangeCb,iso)
  inp.dispatchEvent(new Event('change'))
}
function dpManualSet(id,cb){
  const man=document.getElementById('dpman-'+id)
  const d=parseDMY(man.value)
  if(!d){toast('Invalid date format (dd/mm/yyyy)','err');return}
  dpSelect(id,toISO(d))
}
function evalDPCb(cb,v){
  try{ new Function('v',cb)(v) }catch(e){}
}

function cpPick(id,color,el){
  document.querySelectorAll(`#cp-${id} .cp-swatch`).forEach(s=>s.classList.remove('on'))

  document.getElementById('cp-preview-'+id).style.background=color

  document.querySelector(`#cp-${id} .cp-native`).value=color

function cpHexInput(id,val){
  if(/^#[0-9a-fA-F]{6}$/.test(val)){
    document.getElementById('cp-preview-'+id).style.background=val
    document.querySelectorAll(`#cp-${id} .cp-swatch`).forEach(s=>s.classList.remove('on'))
    document.querySelector(`#cp-${id} .cp-native`).value=val
  }
}
function cpNative(id,val){
  document.getElementById('cp-preview-'+id).style.background=val
  document.getElementById('cp-hex-'+id).value=val
  document.querySelectorAll(`#cp-${id} .cp-swatch`).forEach(s=>s.classList.remove('on'))
}
function cpGetColor(id){
  const hex=document.getElementById('cp-hex-'+id)?.value
  return /^#[0-9a-fA-F]{6}$/.test(hex)?hex:COLORS[0]

function getStatus(){

}
function onTaskStartChange(iso){
  const mdEl=document.getElementById('f-manday')
  if(!mdEl) return
  const md=parseFloat(mdEl.value)||1
  const newEnd=calcEndDate(iso,md)
  const inp=document.getElementById('dpinput-task-end')

  if(dpState['task-end']) dpState['task-end'].isoValue=newEnd

function onTaskMandayChange(val){
  const md=parseFloat(val)
  if(!md||md<=0) return
  const startInp=document.getElementById('dpinput-task-start')
  if(!startInp) return
  const startISO=dpState['task-start']?.isoValue || (parseDMY(startInp.value)?toISO(parseDMY(startInp.value)):isoToday())
  const newEnd=calcEndDate(startISO,md)
  const endInp=document.getElementById('dpinput-task-end')
  if(endInp) endInp.value=fmtDMY(newEnd)
  if(dpState['task-end']) dpState['task-end'].isoValue=newEnd

async function saveTask(taskId){
  const title=document.getElementById('f-title')?.value.trim()
  if(!title){toast('Title is required','err');return}
  if(!_modalResources.length){toast('Add at least 1 resource','err');return}
  const startISO=dpState['task-start']?.isoValue||isoToday()
  const endISO=dpState['task-end']?.isoValue||isoToday()
  const obj={
    id:taskId||uid(),
    projectId:document.getElementById('f-project').value,
    title,
    sprint:document.getElementById('f-sprint').value.trim(),
    startDate:startISO,
    endDate:endISO,
    status:getStatus(),
    note:document.getElementById('f-note')?.value.trim()||'',
    resources:_modalResources.map(r=>({resourceId:r.resourceId,manday:Number(r.manday)||1}))
  }
  if(taskId){const idx=DB.tasks.findIndex(t=>t.id===taskId);if(idx>-1)DB.tasks[idx]=obj}
  else DB.tasks.push(obj)
  closeModal()
  await saveDB(); render()
  toast(taskId?'Task updated ✓':'Task added ✓','ok')
}

function toggleSelectMode(){
  selectMode=!selectMode
  if(!selectMode) selectedTaskIds.clear()
  render()
}
function clearSelection(){
  selectMode=false
  selectedTaskIds.clear()
  render()
}
function renderTopbarActions(){
  const el=document.getElementById('topbar-actions')
  if(!el) return
  const cnt=selectedTaskIds.size
  if(selectMode&&cnt>0){
    el.innerHTML=`<span style="font-size:12px;color:var(--text3)">Selected <b style="color:var(--accent2)">${cnt}</b> task${cnt>1?'s':''}</span>
      <button class="btn btn-danger btn-sm" onclick="deleteSelectedTasks()">🗑 Delete</button>
      <button class="btn btn-ghost btn-sm" onclick="clearSelection()">✕ Cancel</button>`
  } else {
    el.innerHTML=`<button class="btn btn-ghost btn-sm${selectMode?' select-mode-btn active':''}" onclick="toggleSelectMode()">☑ Select</button>
      <button class="btn btn-primary btn-sm" onclick="openTaskModal()">+ Add Task</button>`
  }
}
function selectSprintTasks(pid,sp){
  const tasks=getFilteredTasks().filter(t=>t.projectId===pid&&(t.sprint||'(No Sprint)')===sp)
  const allSelected=tasks.every(t=>selectedTaskIds.has(t.id))
  if(allSelected){ tasks.forEach(t=>selectedTaskIds.delete(t.id)) }
  else { tasks.forEach(t=>selectedTaskIds.add(t.id)) }
  document.querySelectorAll('.task-checkbox').forEach(cb=>{
    cb.checked=selectedTaskIds.has(cb.dataset.tid)
  })
  document.querySelectorAll('.gantt-task-row').forEach(row=>{
    row.classList.toggle('selected-row', selectedTaskIds.has(row.dataset.taskid))
  })
  renderTopbarActions()
}
function handleTaskRowClick(e,taskId){
  if(selectMode){
    // toggle checkbox
    const cb=e.currentTarget.querySelector('.task-checkbox')
    if(selectedTaskIds.has(taskId)){
      selectedTaskIds.delete(taskId)
      if(cb) cb.checked=false
    } else {
      selectedTaskIds.add(taskId)
      if(cb) cb.checked=true
    }
    // update row class without full re-render
    const row=e.currentTarget.closest('.gantt-task-row')
    if(row){
      row.classList.toggle('selected-row', selectedTaskIds.has(taskId))
    }
    // update floating bar
    renderTopbarActions()
    return
  }
  openTaskModal(taskId)
}
async function deleteSelectedTasks(){
  if(!selectedTaskIds.size) return
  const count=selectedTaskIds.size
  DB.tasks=DB.tasks.filter(t=>!selectedTaskIds.has(t.id))
  selectedTaskIds.clear()
  selectMode=false
  await saveDB(); render()
  toast('Deleted '+count+' task'+(count>1?'s':'')+' ✓','ok')
}
async function deleteTaskDirect(id){
  DB.tasks=DB.tasks.filter(t=>t.id!==id)
  closeModal(); await saveDB(); render()
  toast('Task deleted','ok')
}

async function duplicateTask(id){
  const t=DB.tasks.find(x=>x.id===id)
  if(!t) return
  const newT={...t,id:uid(),title:t.title+' (copy)',resources:JSON.parse(JSON.stringify(t.resources||[]))}
  DB.tasks.push(newT)
  await saveDB(); render()
  toast('Task duplicated ✓','ok')
}

  showModal(`

      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>

        <div class="holiday-list" id="holiday-list" style="max-height:260px;overflow-y:auto">
          ${renderHolidayList()}
        </div>
        <div class="add-holiday-row" style="margin-top:10px">
          ${renderDatePicker('hol-date',isoToday(),'','')}
          <button class="btn btn-primary btn-sm" onclick="addHoliday()" style="margin-left:8px">+ Add</button>
        </div>
      </div>
      <div class="modal-foot"><div></div>
        <div class="modal-foot-r"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Close</button></div>
      </div>
    </div>`)
}
function renderHolidayList(){
  if(!DB.holidays?.length) return '<div style="color:var(--text3);font-size:12px;padding:8px">No holidays set</div>'
  const sorted=[...DB.holidays].sort((a,b)=>a.date.localeCompare(b.date))
  // Group by year
  const byYear={}
  for(const h of sorted){
    const yr=h.date.slice(0,4)
    if(!byYear[yr]) byYear[yr]=[]
    byYear[yr].push(h)
  }
  const years=Object.keys(byYear).sort((a,b)=>b-a)
  const collapsed=window._holYearCollapsed||{}
  return years.map(yr=>{
    const isCollapsed=collapsed[yr]
    const items=byYear[yr]
    return `<div class="hol-year-group">
      <div class="hol-year-header" onclick="toggleHolYear('${yr}')">
        <span class="hol-year-arrow">${isCollapsed?'▶':'▼'}</span>
        <span class="hol-year-label">${yr}</span>
        <span class="hol-year-count">${items.length} days</span>
      </div>
      ${isCollapsed?'':items.map(h=>`
        <div class="holiday-item">
          <span class="holiday-date">${fmtDMY(h.date)}</span>
          <span class="holiday-name">${new Date(h.date+'T00:00:00').toLocaleString('en',{weekday:'short'})}</span>
          <button class="holiday-del" onclick="removeHoliday('${h.date}')">✕</button>
        </div>`).join('')}
    </div>`
  }).join('')
}
function toggleHolYear(yr){
  if(!window._holYearCollapsed) window._holYearCollapsed={}
  window._holYearCollapsed[yr]=!window._holYearCollapsed[yr]
  const el=document.getElementById('holiday-list')
  if(el) el.innerHTML=renderHolidayList()
}
async function addHoliday(){
  const iso=dpState['hol-date']?.isoValue||isoToday()
  if(!DB.holidays) DB.holidays=[]
  if(DB.holidays.some(h=>h.date===iso)){toast('Already added','warn');return}
  DB.holidays.push({date:iso,name:''})
  document.getElementById('holiday-list').innerHTML=renderHolidayList()
  await saveDB()
  toast('Holiday added ✓','ok')
}
async function removeHoliday(iso){
  DB.holidays=DB.holidays.filter(h=>h.date!==iso)
  document.getElementById('holiday-list').innerHTML=renderHolidayList()
  await saveDB()
}

  const file=e.dataTransfer.files[0]
  if(file) parseImportFile(file)
}
function handleImportFile(input){
  const file=input.files[0]
  if(file) parseImportFile(file)
}

function parseImportFile(file){
  const ext=file.name.split('.').pop().toLowerCase()
  if(ext==='csv'){
    // Read as ArrayBuffer first to detect encoding
    const reader=new FileReader()
    reader.onload=e=>{
      const buf=e.target.result
      const bytes=new Uint8Array(buf)
      // Detect BOM
      let encoding='UTF-8'
      if(bytes[0]===0xFF&&bytes[1]===0xFE) encoding='UTF-16LE'
      else if(bytes[0]===0xFE&&bytes[1]===0xFF) encoding='UTF-16BE'
      else if(bytes[0]===0xEF&&bytes[1]===0xBB&&bytes[2]===0xBF) encoding='UTF-8'
      else {
        // Heuristic: check if valid UTF-8, else try Windows-874 (Thai)
        try {
          const decoded=new TextDecoder('UTF-8',{fatal:true}).decode(buf)
          // If contains replacement char, try TIS-620
          if(decoded.includes('�')) encoding='windows-874'
        } catch(err) { encoding='windows-874' }
      }
      let text=new TextDecoder(encoding).decode(buf)
      // Strip BOM if present
      if(text.charCodeAt(0)===0xFEFF) text=text.slice(1)
      parseCSV(text)
    }
    reader.readAsArrayBuffer(file)
  } else {
    // XLSX: load SheetJS from CDN
    if(typeof XLSX==='undefined'){
      const s=document.createElement('script')
      s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'
      s.onload=()=>parseXLSX(file)
      document.head.appendChild(s)
    } else parseXLSX(file)
  }
}

function parseXLSX(file){
  const reader=new FileReader()
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array',cellDates:true,dateNF:'dd/mm/yyyy'})
    const ws=wb.Sheets[wb.SheetNames[0]]
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'dd/mm/yyyy'})
    processImportRows(rows)
  }
  reader.readAsArrayBuffer(file)
}

function parseCSV(text){
  const rows=text.split('\n').map(r=>r.split(',').map(c=>c.trim().replace(/^"|"$/g,'')))
  processImportRows(rows)
}

function processImportRows(rows){
  if(!rows.length){toast('Empty file','err');return}
  const header=rows[0].map(h=>String(h||'').trim().toLowerCase())
  const colIdx={
    project: header.findIndex(h=>h==='project'),
    sprint:  header.findIndex(h=>h==='sprint'||h==='note'),
    task:    header.findIndex(h=>h==='task'),
    resource:header.findIndex(h=>h==='resource'),
    manday:  header.findIndex(h=>h==='manday'||h==='man day'||h==='man-day'),
    start:   header.findIndex(h=>h==='start'||h==='start date'),
    end:     header.findIndex(h=>h==='end'||h==='end date'),
    status:  header.findIndex(h=>h==='status')
  }

  const required=['project','task','start','end']
  const missing=required.filter(k=>colIdx[k]===-1)
  if(missing.length){toast('Missing columns: '+missing.join(', '),'err');return}

  importRows=[]
  for(let i=1;i<rows.length;i++){
    const r=rows[i]
    if(!r||r.every(c=>!c)) continue
    const projName=r[colIdx.project]?.trim()
    const taskName=r[colIdx.task]?.trim()
    if(!projName||!taskName) continue

    // Parse dates - supports multiple formats
    const startRaw=String(r[colIdx.start]||'').trim()
    const endRaw=String(r[colIdx.end]||'').trim()
    const startISO=parseFlexDate(startRaw)
    const endISO=parseFlexDate(endRaw)
    if(!startISO||!endISO) continue

    importRows.push({
      projectName:projName,
      sprint:colIdx.sprint>=0?r[colIdx.sprint]?.trim()||'':'',
      title:taskName,
      resourceName:colIdx.resource>=0?r[colIdx.resource]?.trim()||'':'',
      manday:parseFloat(r[colIdx.manday])||1,
      startDate:startISO,endDate:endISO,
      status:colIdx.status>=0?normalizeStatus(r[colIdx.status]):'To do'
    })
  }

  const preview=document.getElementById('import-preview')
  if(!importRows.length){toast('No valid rows found','err');if(preview)preview.innerHTML='';return}

  preview.innerHTML=`<div class="import-preview">
    <strong style="font-size:12px;color:var(--text)">${importRows.length} tasks found:</strong>
    ${importRows.slice(0,8).map(r=>`<div class="import-preview-row">${esc(r.projectName)} › ${esc(r.title)} (${fmtDMY(r.startDate)} – ${fmtDMY(r.endDate)})</div>`).join('')}
    ${importRows.length>8?`<div style="color:var(--text3);font-size:11px">... and ${importRows.length-8} more</div>`:''}
  </div>`

  const btn=document.getElementById('import-confirm-btn')
  if(btn) btn.style.display='inline-flex'
}

function parseFlexDate(s){
  if(!s) return null
  const str=String(s).trim()
  // Already ISO: YYYY-MM-DD or YYYY-MM-DDTHH:MM:SS
  const mISO=str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/)
  if(mISO) return `${mISO[1]}-${mISO[2].padStart(2,'0')}-${mISO[3].padStart(2,'0')}`
  // DD/MM/YYYY or D/M/YYYY
  const mDMY=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)
  if(mDMY) return `${mDMY[3]}-${mDMY[2].padStart(2,'0')}-${mDMY[1].padStart(2,'0')}`
  // DD-MM-YYYY
  const mDMY2=str.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/)
  if(mDMY2) return `${mDMY2[3]}-${mDMY2[2].padStart(2,'0')}-${mDMY2[1].padStart(2,'0')}`
  // DD-Mon-YYYY e.g. 09-Feb-2026
  const mMon=str.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/)
  if(mMon){
    const months={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12}
    const mo=months[mMon[2].toLowerCase()]
    if(mo) return `${mMon[3]}-${String(mo).padStart(2,'0')}-${String(mMon[1]).padStart(2,'0')}`
  }
  // M/D/YYYY (Excel US format) - only if month <= 12 and day <= 31
  const mMDY=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)
  if(mMDY&&parseInt(mMDY[1])<=12&&parseInt(mMDY[2])<=31)
    return `${mMDY[3]}-${mMDY[1].padStart(2,'0')}-${mMDY[2].padStart(2,'0')}`
  return null
}

function normalizeStatus(s){
  if(!s) return 'To do'
  const l=s.toLowerCase()
  if(l==='done'||l==='complete'||l==='completed') return 'Done'
  if(l==='doing'||l==='in progress'||l==='inprogress') return 'Doing'
  return 'To do'
}

function downloadTemplate(){
  const csv=[
    'Sprint,Project,Resource,Task,Manday,Start,End,Status',
    'Sprint 1,Mantra,Hus,Backend API setup,3,06/01/2025,10/01/2025,Done',
    'Sprint 1,Mantra,Mic,UI Design system,4,06/01/2025,09/01/2025,Done',
    'Sprint 2,EWA,"Pack, Nan","Dashboard screens","3, 2",27/01/2025,07/02/2025,Doing',
    'Sprint 1,Flowly,Nut,Flow builder core,5,03/03/2025,14/03/2025,To do',
  ].join('\n')
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'})
  const url=URL.createObjectURL(blob)
  const a=document.createElement('a')
  a.href=url; a.download='senna-template.csv'; a.click()
  URL.revokeObjectURL(url)
  toast('Template downloaded ✓','ok')
}
async function confirmImport(){
  let created=0,projNew=0,resNew=0
  for(const row of importRows){
    // Find or create project
    let proj=DB.projects.find(p=>p.name.toLowerCase()===row.projectName.toLowerCase())
    if(!proj){
      proj={id:uid(),name:row.projectName,color:COLORS[DB.projects.length%COLORS.length],description:'Imported'}
      DB.projects.push(proj)
      projNew++
    }
    // Resources handled below with comma-split support
    // Handle comma-separated resources
    const resNames=row.resourceName?row.resourceName.split(',').map(s=>s.trim()).filter(Boolean):[]
    const mandayParts=String(row.manday).split(',').map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n))
    const totalMd=mandayParts.reduce((s,n)=>s+n,0)||row.manday||1
    const resources=resNames.length>0?resNames.map((rName,i)=>{
      let rObj=DB.resources.find(r=>r.name.toLowerCase()===rName.toLowerCase())
      if(!rObj){rObj={id:uid(),name:rName,role:'Dev',color:COLORS[DB.resources.length%COLORS.length]};DB.resources.push(rObj);resNew++}
      const md=mandayParts[i]||totalMd/Math.max(resNames.length,1)
      return {resourceId:rObj.id,manday:md}
    }):[{resourceId:'',manday:totalMd}]
    DB.tasks.push({
      id:uid(),projectId:proj.id,
      title:row.title,sprint:row.sprint,
      startDate:row.startDate,endDate:row.endDate,status:row.status,note:'',
      resources
    })
    created++
  }
  closeModal()
  await saveDB(); render()
  toast(`Imported ${created} tasks${projNew?' (+'+projNew+' projects)':''}${resNew?' (+'+resNew+' resources)':''}  ✓`,'ok')
}

}

}

function showModal(html){
  document.getElementById('modal-overlay')?.remove()
  const el=document.createElement('div')
  el.className='overlay'; el.id='modal-overlay'
  el.innerHTML='<div class="modal">'+html+'</div>'
  el.addEventListener('click',e=>{if(e.target===el)closeModal()})
  document.body.appendChild(el)
  // Bind resource row events via delegation
  const wrap=document.getElementById('res-rows-wrap')
  if(wrap){
    wrap.addEventListener('change',e=>{
      const t=e.target
      if(t.classList.contains('res-sel-r')){
        const i=parseInt(t.dataset.i)
        const field=t.dataset.field
        if(_modalResources[i]!==undefined) _modalResources[i][field]=t.type==='number'?parseFloat(t.value)||0:t.value
      }
    })
    wrap.addEventListener('input',e=>{
      const t=e.target
      if(t.classList.contains('res-sel-r')&&t.type==='number'){
        const i=parseInt(t.dataset.i)
        if(_modalResources[i]!==undefined) _modalResources[i].manday=parseFloat(t.value)||0
      }
    })
    wrap.addEventListener('click',e=>{
      const btn=e.target.closest('.res-del-r')
      const addBtn=e.target.closest('#res-add-btn')
      if(btn){
        const i=parseInt(btn.dataset.i)
        if(_modalResources.length<=1){toast('Need at least 1 resource','warn');return}
        _modalResources.splice(i,1)
        wrap.innerHTML=renderResourceRows()
      }
      if(addBtn){
        _modalResources.push({resourceId:DB.resources[0]?.id||'',manday:1})
        wrap.innerHTML=renderResourceRows()
      }
    })
  }
}
function closeModal(){ document.getElementById('modal-overlay')?.remove() }

// INIT
// ═══════════════════════════════════════════════════════════════════
function init(){
  initTheme()
  const sg=localStorage.getItem('senna_gist')
  if(sg){try{GIST=JSON.parse(sg)}catch(e){}}
  // Clear old format (tasks with resourceId instead of resources[])
  const sd=localStorage.getItem('senna_db')
  let needReset=false
  if(sd){
    try{
      const parsed=JSON.parse(sd)
      // Detect old format: any task with resourceId but no resources array
      if(parsed.tasks&&parsed.tasks.some(t=>t.resourceId&&!t.resources)){
        needReset=true
      } else {
        DB=parsed
      }
    }catch(e){needReset=true}
  } else { needReset=true }
  if(needReset){
    DB=JSON.parse(JSON.stringify(SEED))
    saveLocal()
  }
  if(!DB.holidays) DB.holidays=JSON.parse(JSON.stringify(SEED.holidays))
  updateGistUI()
  if(GIST.id&&GIST.token) syncFromGist()
  render()
}
init()
